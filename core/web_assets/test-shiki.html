from typing import AsyncIterator, Protocol
import asyncio


class Streamable(Protocol):
    """Protocol for objects that support async streaming."""

    async def stream(self) -> AsyncIterator[bytes]: ...


@dataclass
class Config:
    host: str = "localhost"
    port: int = 8080
    debug: bool = False
    tags: list[str] = field(default_factory=list)

    @property
    def base_url(self) -> str:
        scheme = "http" if self.debug else "https"
        return f"{scheme}://{self.host}:{self.port}"


class Pipeline:
    TIMEOUT: float = 30.0

    def __init__(self, config: Config) -> None:
        self._config = config
        self._running = False

    async def process(self, source: Streamable) -> list[bytes]:
        """Collect all chunks from an async stream."""
        self._running = True
        chunks: list[bytes] = []
        try:
            async for chunk in source.stream():
                chunks.append(chunk)
                if len(chunks) % 100 == 0:
                    print(f"Processed {len(chunks)} chunks...")
        finally:
            self._running = False
        return chunks


async def main():
    cfg = Config(host="0.0.0.0", port=443, tags=["prod", "v2"])
    print(f"Starting pipeline at {cfg.base_url}")
    pipeline = Pipeline(cfg)
    # ... would normally pass a real Streamable here
    print(f"Timeout set to {Pipeline.TIMEOUT}s")


if __name__ == "__main__":
    asyncio.run(main())

` + "```java\n" + String.raw`package com.example.pipeline;

import java.util.*;
import java.util.concurrent.CompletableFuture;
import java.util.function.Function;
import java.util.stream.Collectors;

/**
 * A type-safe, composable data pipeline.
 */
public sealed interface Stage<I, O> permits MapStage, FilterStage, FlatMapStage {

    CompletableFuture<O> process(I input);

    default <R> Stage<I, R> andThen(Stage<O, R> next) {
        return input -> this.process(input).thenCompose(next::process);
    }
}

record MapStage<I, O>(Function<I, O> mapper) implements Stage<I, O> {
    @Override
    public CompletableFuture<O> process(I input) {
        return CompletableFuture.completedFuture(mapper.apply(input));
    }
}

record FilterStage<T>(java.util.function.Predicate<T> predicate)
        implements Stage<T, Optional<T>> {
    @Override
    public CompletableFuture<Optional<T>> process(T input) {
        return CompletableFuture.completedFuture(
            predicate.test(input) ? Optional.of(input) : Optional.empty()
        );
    }
}

record FlatMapStage<I, O>(Function<I, List<O>> expander) implements Stage<I, List<O>> {
    @Override
    public CompletableFuture<List<O>> process(I input) {
        return CompletableFuture.completedFuture(expander.apply(input));
    }
}

class PipelineRunner {
    public static void main(String[] args) {
        var upper = new MapStage<String, String>(String::toUpperCase);
        var lengths = new MapStage<String, Integer>(String::length);

        Stage<String, Integer> composed = upper.andThen(lengths);

        List<String> words = List.of("hello", "shiki", "highlighting");
        List<Integer> results = words.stream()
            .map(w -> composed.process(w).join())
            .collect(Collectors.toList());

        System.out.println("Lengths: " + results);  // [5, 5, 12]
    }
}

` + "```typescript\n" + `interface Entity {
  id: string;
  createdAt: Date;
  updatedAt: Date;
}

type Mutable<T> = {
  -readonly [K in keyof T]: T[K];
};

type EntityUpdate<T extends Entity> = Partial<Omit<Mutable<T>, "id" | "createdAt">>;

interface Repository<T extends Entity> {
  findById(id: string): Promise<T | null>;
  findAll(filter?: Partial<T>): AsyncIterable<T>;
  save(entity: T): Promise<T>;
  update(id: string, changes: EntityUpdate<T>): Promise<T>;
  delete(id: string): Promise<boolean>;
}

interface User extends Entity {
  readonly email: string;
  name: string;
  role: "admin" | "editor" | "viewer";
  preferences: Record<string, unknown>;
}

class InMemoryRepository<T extends Entity> implements Repository<T> {
  private store = new Map<string, T>();

  async findById(id: string): Promise<T | null> {
    return this.store.get(id) ?? null;
  }

  async *findAll(filter?: Partial<T>): AsyncIterable<T> {
    for (const entity of this.store.values()) {
      if (!filter || this.matches(entity, filter)) {
        yield entity;
      }
    }
  }

  async save(entity: T): Promise<T> {
    this.store.set(entity.id, { ...entity, updatedAt: new Date() });
    return entity;
  }

  async update(id: string, changes: EntityUpdate<T>): Promise<T> {
    const existing = this.store.get(id);
    if (!existing) throw new Error(\`Entity \${id} not found\`);

    const updated = { ...existing, ...changes, updatedAt: new Date() };
    this.store.set(id, updated);
    return updated;
  }

  async delete(id: string): Promise<boolean> {
    return this.store.delete(id);
  }

  private matches(entity: T, filter: Partial<T>): boolean {
    return Object.entries(filter).every(
      ([key, value]) => entity[key as keyof T] === value
    );
  }
}

// Usage
async function demo() {
  const repo = new InMemoryRepository<User>();

  const user: User = {
    id: crypto.randomUUID(),
    email: "alice@example.com",
    name: "Alice",
    role: "admin",
    preferences: { theme: "dark", lang: "en" },
    createdAt: new Date(),
    updatedAt: new Date(),
  };

  await repo.save(user);
  await repo.update(user.id, { role: "editor", name: "Alice B." });

  for await (const u of repo.findAll({ role: "editor" })) {
    console.log(\`Found: \${u.name} (\${u.email})\`);
  }
}

The **quadratic formula** solves $ax^2 + bx + c = 0$:

$$x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$$

**Euler's identity** connects five fundamental constants:

$$e^{i\pi} + 1 = 0$$

The **Gaussian integral** evaluates to:

$$\int_{-\infty}^{\infty} e^{-x^2} \, dx = \sqrt{\pi}$$

**Maxwell's equations** in differential form:

$$\nabla \cdot \mathbf{E} = \frac{\rho}{\varepsilon_0}, \quad \nabla \times \mathbf{B} = \mu_0 \mathbf{J} + \mu_0 \varepsilon_0 \frac{\partial \mathbf{E}}{\partial t}$$

The **softmax function** used in neural networks:

$$\sigma(z_i) = \frac{e^{z_i}}{\sum_{j=1}^{K} e^{z_j}}$$

        function updateContent(markdownText) {
            // Temporarily replace mermaid blocks so marked doesn't touch them
            let mermaidBlocks = [];
            let tempText = markdownText.replace(/```mermaid([\s\S]*?)```/g, function(match, p1) {
                mermaidBlocks.push(p1);
                return `<!--MERMAID_BLOCK_${mermaidBlocks.length - 1}-->`;
            });

            // Parse markdown
            let html = marked.parse(tempText);

            // Restore mermaid blocks
            mermaidBlocks.forEach((block, index) => {
                html = html.replace(`<!--MERMAID_BLOCK_${index}-->`, `<div class="mermaid">${block}</div>`);
            });

            document.getElementById('content').innerHTML = html;

            // Apply Shiki highlighting
            document.querySelectorAll('pre code').forEach((el) => {
                const langMatch = el.className.match(/language-(\S+)/);
                const lang = langMatch ? langMatch[1] : null;
                if (lang) {
                    el.parentElement.setAttribute('data-lang', lang);
                }
                const code = el.textContent;
                const highlighted = window.shikiHighlight(code, lang);
                if (highlighted) {
                    const wrapper = document.createElement('div');
                    wrapper.innerHTML = highlighted;
                    const newPre = wrapper.firstElementChild;
                    if (lang) {
                        newPre.setAttribute('data-lang', lang);
                    }
                    el.parentElement.replaceWith(newPre);
                }
            });

            // Render Math via KaTeX
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(document.getElementById('content'), {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false},
                        {left: "\\(", right: "\\)", display: false},
                        {left: "\\[", right: "\\]", display: true}
                    ]
                });
            }

            // Render Mermaid diagrams
            if (typeof mermaid !== 'undefined' && mermaid.run) {
                mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
            }
        }

        // Wait for Shiki to initialize, then render
        window.shikiReady.then(() => {
            updateContent(testMarkdown);
        });
    </script>
